name: Build AetherOS ISO

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, fedora]
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap dnf

      - name: Build Desktop ISO
        run: |
          chmod +x iso-builder/build_iso.sh
          sudo ./iso-builder/build_iso.sh "${{ matrix.distro }}" "${{ matrix.arch }}" Desktop dist

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetheros-${{ matrix.distro }}-${{ matrix.arch }}-desktop
          path: dist/*
